# Jekyll configuration for Learning Space 01
title: Learning Space 01
description: 你的个人学习工具箱 — 精心设计的工具，帮助你更高效地学习
baseurl: ""
url: "https://learningspace01.github.io"
lang: zh-CN

# Build settings
markdown: kramdown
permalink: pretty

# Exclude from build
exclude:
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - README.md
  - .claude/
  - .vscode/
  - .idea/

# Default front matter for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "vocab"
    values:
      layout: null
